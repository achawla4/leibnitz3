<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leibnitz - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --dark-bg: #0a0e27;
            --darker-bg: #050812;
            --card-bg: #0f1535;
            --signal-green: #00ff88;
            --signal-blue: #00d4ff;
            --text-primary: #ffffff;
            --text-secondary: #b0b8cc;
            --border-color: #1a2847;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, var(--darker-bg) 0%, var(--dark-bg) 100%);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: absolute;
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, rgba(0, 255, 136, 0.08) 0%, transparent 70%);
            top: -300px;
            left: -300px;
            z-index: 0;
        }

        .login-container {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 1rem;
            padding: 3rem 2.5rem;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 60px rgba(0, 255, 136, 0.1);
            position: relative;
            z-index: 1;
        }

        .logo {
            text-align: center;
            margin-bottom: 2rem;
        }

        .leibnitz-name {
            font-family: 'Great Vibes', cursive;
            font-size: 3.2rem;
            background: linear-gradient(135deg, var(--signal-green) 0%, var(--signal-blue) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.3rem;
        }

        .tagline {
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.95rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        h2 {
            text-align: center;
            margin: 2rem 0 1.5rem;
            color: var(--signal-green);
            font-weight: 600;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        input {
            width: 100%;
            padding: 1rem;
            background: rgba(5, 8, 18, 0.8);
            border: 1px solid var(--border-color);
            border-radius: 0.5rem;
            color: white;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--signal-green);
            box-shadow: 0 0 0 3px rgba(0, 255, 136, 0.1);
        }

        .btn-login {
            width: 100%;
            padding: 1.1rem;
            background: linear-gradient(135deg, var(--signal-green) 0%, #00cc6f 100%);
            color: #050812;
            border: none;
            border-radius: 0.5rem;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 1rem;
            transition: all 0.3s ease;
        }

        .btn-login:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0, 255, 136, 0.3);
        }

        .message {
            text-align: center;
            margin-bottom: 1.5rem;
            font-size: 0.95rem;
            padding: 0.75rem;
            border-radius: 0.5rem;
            border: 1px solid transparent;
        }

        .message.error {
            color: #ff3344;
            background: rgba(255, 51, 68, 0.1);
            border-color: rgba(255, 51, 68, 0.2);
        }

        .message.success {
            color: var(--signal-green);
            background: rgba(0, 255, 136, 0.1);
            border-color: rgba(0, 255, 136, 0.2);
        }

        .tabs {
            display: flex;
            background: rgba(5, 8, 18, 0.6);
            border: 1px solid var(--border-color);
            border-radius: 0.5rem;
            padding: 0.25rem;
            margin-bottom: 1.5rem;
            position: relative;
        }

        .tab-btn {
            flex: 1;
            padding: 0.75rem;
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            border-radius: 0.35rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-align: center;
        }

        .tab-btn:hover {
            color: var(--text-primary);
        }

        .tab-btn.active {
            background: linear-gradient(135deg, var(--signal-green) 0%, var(--signal-blue) 100%);
            color: #050812;
            font-weight: 700;
            box-shadow: 0 4px 15px rgba(0, 255, 136, 0.2);
        }

        .auth-form {
            display: none;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .auth-form.active {
            display: block;
            opacity: 1;
        }

        .guest-link {
            text-align: center;
            margin-top: 2rem;
            color: var(--text-secondary);
        }

        .guest-link a {
            color: var(--signal-blue);
            text-decoration: none;
        }

        .guest-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <h1 class="leibnitz-name">Leibnitz</h1>
            <p class="tagline">Signal Processing Suite</p>
        </div>

        <div class="tabs">
            <button id="tab-register" class="tab-btn {% if active_tab == 'register' %}active{% endif %}" onclick="switchTab('register')">Register</button>
            <button id="tab-login" class="tab-btn {% if active_tab == 'login' %}active{% endif %}" onclick="switchTab('login')">Sign In</button>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="message {{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <!-- Registration Form -->
        <form id="form-register" method="POST" class="auth-form {% if active_tab == 'register' %}active{% endif %}" style="{% if active_tab == 'register' %}display: block; opacity: 1;{% else %}display: none; opacity: 0;{% endif %}">
            <input type="hidden" name="action" value="register">
            
            <div class="form-group">
                <label for="reg-username">Username</label>
                <input type="text" id="reg-username" name="username" value="{% if active_tab == 'register' %}{{ username or '' }}{% endif %}" required autocomplete="username">
            </div>

            <div class="form-group">
                <label for="reg-password">Password</label>
                <input type="password" id="reg-password" name="password" required autocomplete="new-password">
            </div>

            <div class="form-group">
                <label for="confirm_password">Confirm Password</label>
                <input type="password" id="confirm_password" name="confirm_password" required autocomplete="new-password">
            </div>

            <button type="submit" class="btn-login">REGISTER</button>
        </form>

        <!-- Login Form -->
        <form id="form-login" method="POST" class="auth-form {% if active_tab == 'login' %}active{% endif %}" style="{% if active_tab == 'login' %}display: block; opacity: 1;{% else %}display: none; opacity: 0;{% endif %}">
            <input type="hidden" name="action" value="login">
            
            <div class="form-group">
                <label for="login-username">Username</label>
                <input type="text" id="login-username" name="username" value="{% if active_tab == 'login' %}{{ username or '' }}{% endif %}" required autocomplete="username">
            </div>

            <div class="form-group">
                <label for="login-password">Password</label>
                <input type="password" id="login-password" name="password" required autocomplete="current-password">
            </div>

            <button type="submit" class="btn-login">LOGIN</button>
        </form>

        <div class="guest-link">
            <p>Demo Credentials: <strong>demo</strong> / <strong>demo123</strong></p>
            <a href="/">← Back to Homepage</a>
        </div>
    </div>

    <script>
        function switchTab(tabName) {
            // Update tab button active states
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('tab-' + tabName).classList.add('active');

            // Hide and reset all forms
            document.querySelectorAll('.auth-form').forEach(form => {
                form.classList.remove('active');
                form.style.display = 'none';
                form.style.opacity = '0';
            });

            // Show and fade in the selected form
            const activeForm = document.getElementById('form-' + tabName);
            activeForm.style.display = 'block';
            setTimeout(() => {
                activeForm.style.opacity = '1';
                activeForm.classList.add('active');
            }, 50);
        }
    </script>
</body>
</html>
